name: Validate isolation_source_to_ontology mapping

# Two-tier validation gate for `mappings/isolation_source_to_ontology.tsv`:
#
# Tier 1 (in-repo, always runs, hard gate):
#   `mappings/validate_isolation_source_mappings.py` enforces semantic-family
#   compatibility — it rejects ontology mappings whose target ontology family
#   is incompatible with isolation-source semantics (e.g. units used for
#   anatomy, ENVO 'human construction' for a host taxon, plant-specific
#   structures for a generic infection label). The validator only fails on
#   *trusted* rows (skos:exactMatch high-confidence or
#   semapv:ManualMappingCuration); low-confidence ols4_auto closeMatch rows
#   are silently dropped at runtime by the loader and not flagged here.
#
# Tier 2 (external, structural, soft gate):
#   The orchestration repo CultureBotAI/culturebotai-claw hosts a structural
#   validator that additionally checks CURIE format, predicate vocabulary,
#   confidence enum, and ontology-category allowlist. It is a soft gate
#   because the repo is currently org-private and the GITHUB_TOKEN cannot
#   read it; the step is wrapped in `continue-on-error: true` so its absence
#   does not fail the workflow. When access is granted, this becomes a hard
#   gate again automatically.

on:
  pull_request:
    branches: [main, master, team-review-sssom]
    paths:
      - "mappings/isolation_source_to_ontology.tsv"
      - "mappings/validate_isolation_source_mappings.py"
      - "kg_microbe/utils/isolation_source_mapping_utils.py"
      - ".github/workflows/validate-isolation-source.yaml"
  push:
    branches: [main, master, team-review-sssom]
    paths:
      - "mappings/isolation_source_to_ontology.tsv"
      - "mappings/validate_isolation_source_mappings.py"
      - "kg_microbe/utils/isolation_source_mapping_utils.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kg-microbe
        uses: actions/checkout@v4
        with:
          path: kg-microbe

      - name: Checkout culturebotai-claw (structural validator — optional)
        id: checkout_claw
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: CultureBotAI/culturebotai-claw
          path: culturebotai-claw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate (family compatibility — in-repo, hard gate)
        run: |
          cd kg-microbe
          python3 mappings/validate_isolation_source_mappings.py

      - name: Validate (structural — culturebotai-claw, soft gate)
        if: steps.checkout_claw.outcome == 'success'
        continue-on-error: true
        env:
          KGMICROBE_ROOT: ${{ github.workspace }}/kg-microbe
        run: |
          cd culturebotai-claw
          python3 scripts/validate_isolation_source_mapping.py

      - name: Note skipped structural validation
        if: steps.checkout_claw.outcome != 'success'
        run: |
          echo "::warning::Skipped culturebotai-claw structural validation — repo not accessible to this workflow's GITHUB_TOKEN. The in-repo family-compatibility validator still ran."
