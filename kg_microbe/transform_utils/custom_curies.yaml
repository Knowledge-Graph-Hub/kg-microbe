    predicate: "METPO:2000517"  # grows in
  blood_agar:
    label: "blood agar"
    description: "Enriched growth medium containing 5-10% sheep or horse blood; supports fastidious organisms and is used for hemolysis assessment. Generic placeholder; specific formulations (Columbia, Heart Infusion, etc.) live as mediadive.medium:* nodes when present in MediaDive's catalog."
