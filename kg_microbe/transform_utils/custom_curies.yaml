# Custom CURIE registry consumed by KG-Microbe transforms.
#
# kgmicrobe.* sub-prefixes:
#   kgmicrobe.activity:*   — molecular activities not yet in GO/EC/METPO
#   kgmicrobe.trait:*      — phenotypic qualities not yet in METPO
#   kgmicrobe.compound:*   — chemical entities not yet in CHEBI
#   kgmicrobe.pathway:*    — biological processes not yet in GO/METPO
#   kgmicrobe.medium:*     — growth media not present in MediaDive's catalog
#                            (e.g. MacConkey/EMB agar). Object of METPO:2000517
#                            'grows in' / METPO:2000518 'does not grow in'.
#   kgmicrobe.ingredient:* — MediaDive ingredients with no MIM/CHEBI/FOODON/UBERON/ENVO mapping
#                            (dynamic; minted from the ingredient label, not statically registered)
#
# Cross-reference for non-kgmicrobe prefixes that show up in transform output and must be
# recognized by validators (kg_model_review.py STANDARD_PREFIXES):
#   MICRO — Microbiology Ontology (https://obofoundry.org/ontology/micro), used by MediaDive
#           to label growth-medium ingredients (e.g. MICRO:0000082 "Nutrient broth No. 2").
#
# Any kgmicrobe.* CURIE that exists as a placeholder for a proposed METPO term
# (i.e. one that appears in mappings/metpo_proposal_*.tsv and will be swapped to
# the official METPO ID once minted upstream) MUST also be listed in
# mappings/kgmicrobe_proposal_placeholders.tsv with status, transform usage, and
# the target METPO ID. That TSV is the swap table; this YAML is the
# label/category/predicate registry consumed by metatraits._build_trait_mapping.
#
phenotypic_quality: &phenotypic_quality_block
  category: "biolink:PhenotypicQuality"
  predicate: "biolink:has_phenotype"

phenotypic_capability: &phenotypic_capability_block
  <<: *phenotypic_quality_block
  predicate: "METPO:2000103"  # capable of

biological_process: &biological_process_block
  category: "biolink:BiologicalProcess"
  predicate: "METPO:2000103"  # capable of

chemical_production: &chemical_production_block
  category: "biolink:ChemicalEntity"
  predicate: "METPO:2000202"  # produces

