name: BacDiveIsolationSources
title: BacDive Isolation Sources
id: https://w3id.org/BacDiveIsolationSources
description: 'LinkML schema for the BacDive "Isolation sources" table (https://bacdive.dsmz.de/isolation-sources,
  "Download table" -> CSV, downloaded 2026-06-08; reproduced via download.yaml as
  data/raw/bacdive_isolation_sources.csv). One row per strain x isolation-source category-path assignment.

  Bootstrapped with schema-automator (generalize-tsv) over the 144,199-row export, then refined. The
  category_1/2/3 slots are BacDive''s controlled three-level isolation-source classification (the "ontology"):
  8 / 59 / 283 terms, each value prefixed with ''#''.

  BacDive uses ''###'' as a multi-value delimiter. The columns that carry it -- isolation_source, country
  and continent -- are modelled as multivalued. continent_enum is the 8 base continents (the raw 33-value
  enum was an artifact of unsplit ''###'' combinations). The category_* columns are single-valued per row;
  a strain accrues multiple category paths across its multiple rows (mean ~2.5 rows / strain).'
prefixes:
  linkml: https://w3id.org/linkml/
  BacDiveIsolationSources: https://w3id.org/BacDiveIsolationSources
default_prefix: BacDiveIsolationSources
imports:
- linkml:types
slots:
  id:
    range: integer
    required: false
    description: 'BacDive strain ID. Repeats across rows: one row per isolation-source category path assigned
      to the strain.'
  species:
    range: string
    required: false
    description: Species name of the strain (populated on the strain's first row).
  culture_collection_number:
    range: string
    required: false
    description: Culture collection number(s) for the strain, comma-separated (e.g. 'DSM 105287, LMG 29911').
  isolation_source:
    range: string
    required: false
    multivalued: true
    description: Free-text isolation-source description(s). BacDive joins multiple descriptions with the
      '###' delimiter.
  country:
    range: string
    required: false
    description: Country/countries of isolation; multiple values joined with '###'.
    multivalued: true
  continent:
    range: continent_enum
    required: false
    description: Continent(s) of isolation; multiple values joined with '###'.
    multivalued: true
  category_1:
    range: category_1_enum
    required: false
    description: Level 1 isolation-source category (the 'ontology'); value is '#'-prefixed (e.g. '#Environmental').
  category_2:
    range: category_2_enum
    required: false
    description: Level 2 isolation-source category; value is '#'-prefixed.
  category_3:
    range: category_3_enum
    required: false
    description: Level 3 isolation-source category; value is '#'-prefixed.
classes:
  IsolationSource:
    slots:
    - id
    - species
    - culture_collection_number
    - isolation_source
    - country
    - continent
    - category_1
    - category_2
    - category_3
    description: 'One row of the BacDive isolation-sources export: a single isolation-source category
      path (category_1 > category_2 > category_3) for a strain, with the strain''s species, culture collection
      number, free-text source, country and continent.'
enums:
  continent_enum:
    description: Continent of isolation (BacDive controlled vocabulary).
    permissible_values:
      Africa: {}
      Antarctica: {}
      Arctic: {}
      Asia: {}
      Australia and Oceania: {}
      Europe: {}
      Middle and South America: {}
      North America: {}
