name: BacDive
title: BacDive strain (full JSON)
id: https://w3id.org/kg-microbe/bacdive-strain-full
description: 'LinkML schema for the full BacDive per-strain JSON export (data/raw/bacdive_strains.json;
  a top-level array of strain records). Bootstrapped with schema-automator generalize-json over a sample,
  then refined (scripts/build_bacdive_json_schema.py): object fields are typed to their nested classes
  (inlined), list-bearing fields are multivalued (BacDive''s single-object-vs-list-of-objects inconsistency),
  and scalar leaves are strings (BacDive types numeric leaves inconsistently). A few keys reused as both
  an object group and a scalar value are disambiguated with slot_usage. Sample-derived enums are kept
  as documentation but not enforced. Raw JSON must be normalized to validate -- see scripts/normalize_bacdive_json.py.
  Coverage is bounded by the build sample size. Sections: General; Name and taxonomic classification;
  Morphology; Culture and growth conditions; Physiology and metabolism; Isolation, sampling and environmental
  information; Safety information; Sequence information; Genome-based predictions; External links; Reference;
  _id.'
prefixes:
  linkml: https://w3id.org/linkml/
  BacDive: https://w3id.org/kg-microbe/bacdive-strain-full/
default_prefix: BacDive
default_range: string
