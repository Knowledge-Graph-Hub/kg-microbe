name: FermentationExplorer
title: Fermentation Explorer database (clean)
id: https://w3id.org/kg-microbe/fermentation-explorer
description: 'LinkML schema for the Fermentation Explorer clean database (thackmann/FermentationExplorer
  database_clean.zip -> data/raw/fermentation_explorer_database_clean.csv): 20,806 records x 52 columns
  of consolidated multi-source taxonomy (LPSN/GTDB/GOLD/NCBI/IMG/Bergey), organism phenotypes, and fermentation
  metabolism / end products. Bootstrapped with schema-automator (generalize-tsv) then curated: enums populated
  from the data, '';''-delimited cells modelled multivalued (GOLD IDs use '',''), measurements typed float,
  and *_link columns flagged as HTML. The raw 95-column per-source table is data/raw/fermentation_explorer_database_raw.csv
  (reference/triage).'
prefixes:
  linkml: https://w3id.org/linkml/
  FermentationExplorer: https://w3id.org/kg-microbe/fermentation-explorer/
default_prefix: FermentationExplorer
default_range: string
imports:
- linkml:types
classes:
  FermentationDatabase:
    tree_root: true
    description: Container for Fermentation Explorer records.
    attributes:
      records:
        range: FermentationRecord
        multivalued: true
        inlined_as_list: true
  FermentationRecord:
    description: 'One organism record: taxonomy, phenotype and fermentation metabolism for a strain.'
    slots:
    - genus
    - species
    - subspecies
    - strain
    - lpsn_id
    - lpsn_page_link
    - lpsn_taxonomy
    - gtdb_id
    - gtdb_id_link
    - gtdb_taxonomy
    - gold_organism_id
    - gold_organism_id_link
    - gold_project_id
    - gold_project_id_link
    - ncbi_taxonomy_id
    - ncbi_taxonomy_id_link
    - ncbi_taxonomy
    - img_genome_id
    - img_genome_id_link
    - img_genome_id_max_genes
    - bacdive_id
    - bacdive_id_link
    - antibiotic_resistance
    - antibiotic_sensitivity
    - cell_length_in_microns
    - cell_shape
    - cell_width_in_microns
    - colony_size
    - flagellum_arrangement
    - gram_stain
    - incubation_period_in_days
    - indole_test
    - motility
    - oxygen_tolerance
    - ph_for_growth
    - pathogenicity
    - salt_for_growth_in_moles_per_liter
    - spore_formation
    - temperature_for_growth_in_degrees
    - voges_proskauer
    - isolation_category_1
    - isolation_category_2
    - isolation_category_3
    - bergey_article_link
    - bergey_taxonomy
    - type_of_metabolism
    - end_products
    - major_end_products
    - minor_end_products
    - substrates_for_end_products
    - fermentation_substrates
    - faprotax_traits
slots:
  genus:
    description: Genus name.
    range: string
    required: true
  species:
    description: Species epithet.
    range: string
    required: false
  subspecies:
    description: Subspecies epithet.
    range: string
    required: false
  strain:
    description: Strain designation(s); ';'-delimited.
    range: string
    multivalued: true
    required: false
  lpsn_id:
    description: LPSN identifier (unique, non-null; used as the record identifier).
    identifier: true
    range: string
    required: false
  lpsn_page_link:
    description: LPSN page link. HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    required: false
  lpsn_taxonomy:
    description: LPSN taxonomy. Lineage string in GTDB style (d__;p__;c__;o__;f__;g__;s__).
    range: string
    required: false
  gtdb_id:
    description: GTDB genome accession.
    range: string
    required: false
  gtdb_id_link:
    description: GTDB link. HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    required: false
  gtdb_taxonomy:
    description: GTDB taxonomy. Lineage string in GTDB style (d__;p__;c__;o__;f__;g__;s__).
    range: string
    required: false
  gold_organism_id:
    description: JGI GOLD organism ID(s); ','-delimited.
    range: string
    multivalued: true
    required: false
  gold_organism_id_link:
    description: GOLD organism link(s). HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    multivalued: true
    required: false
  gold_project_id:
    description: JGI GOLD project ID(s); ','-delimited.
    range: string
    multivalued: true
    required: false
  gold_project_id_link:
    description: GOLD project link(s). HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    multivalued: true
    required: false
  ncbi_taxonomy_id:
    description: NCBI Taxonomy ID.
    range: string
    required: false
  ncbi_taxonomy_id_link:
    description: NCBI Taxonomy link. HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    required: false
  ncbi_taxonomy:
    description: NCBI taxonomy. Lineage string in GTDB style (d__;p__;c__;o__;f__;g__;s__).
    range: string
    required: false
  img_genome_id:
    description: JGI IMG genome ID.
    range: string
    required: false
  img_genome_id_link:
    description: IMG genome link. HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    required: false
  img_genome_id_max_genes:
    description: IMG genome ID of the assembly with the most genes.
    range: string
    required: false
  bacdive_id:
    description: BacDive strain ID.
    range: string
    required: false
  bacdive_id_link:
    description: BacDive link. HTML anchor (<a href=...>) markup as stored in the clean database.
    range: string
    required: false
  antibiotic_resistance:
    description: Antibiotics the organism resists; ';'-delimited.
    range: string
    multivalued: true
    required: false
  antibiotic_sensitivity:
    description: Antibiotics the organism is sensitive to; ';'-delimited.
    range: string
    multivalued: true
    required: false
  cell_length_in_microns:
    description: Cell length (micrometres).
    range: float
    required: false
  cell_shape:
    description: Cell shape(s); ';'-delimited.
    range: CellShapeEnum
    multivalued: true
    required: false
  cell_width_in_microns:
    description: Cell width (micrometres).
    range: float
    required: false
  colony_size:
    description: Colony size (mm).
    range: float
    required: false
  flagellum_arrangement:
    description: Flagellum arrangement(s); ';'-delimited.
    range: FlagellumArrangementEnum
    multivalued: true
    required: false
  gram_stain:
    description: Gram stain result(s); ';'-delimited.
    range: GramStainEnum
    multivalued: true
    required: false
  incubation_period_in_days:
    description: Incubation period (days).
    range: float
    required: false
  indole_test:
    description: Indole test result.
    range: IndoleTestEnum
    multivalued: true
    required: false
  motility:
    description: Motility.
    range: MotilityEnum
    multivalued: true
    required: false
  oxygen_tolerance:
    description: Oxygen tolerance class(es); ';'-delimited.
    range: OxygenToleranceEnum
    multivalued: true
    required: false
  ph_for_growth:
    description: Representative pH for growth.
    range: float
    required: false
  pathogenicity:
    description: Pathogenicity host(s); ';'-delimited.
    range: PathogenicityEnum
    multivalued: true
    required: false
  salt_for_growth_in_moles_per_liter:
    description: Representative salt concentration for growth (mol/L).
    range: float
    required: false
  spore_formation:
    description: Spore formation.
    range: SporeFormationEnum
    multivalued: true
    required: false
  temperature_for_growth_in_degrees:
    description: Representative growth temperature (degrees C).
    range: float
    required: false
  voges_proskauer:
    description: Voges-Proskauer test result.
    range: VogesProskauerEnum
    multivalued: true
    required: false
  isolation_category_1:
    description: Level 1 BacDive isolation-source category; ';'-delimited.
    range: IsolationCategory1Enum
    multivalued: true
    required: false
  isolation_category_2:
    description: Level 2 BacDive isolation-source category; ';'-delimited.
    range: IsolationCategory2Enum
    multivalued: true
    required: false
  isolation_category_3:
    description: Level 3 BacDive isolation-source category; ';'-delimited.
    range: IsolationCategory3Enum
    multivalued: true
    required: false
  bergey_article_link:
    description: Bergey's Manual article link. HTML anchor (<a href=...>) markup as stored in the clean
      database.
    range: string
    required: false
  bergey_taxonomy:
    description: Bergey taxonomy. Lineage string in GTDB style (d__;p__;c__;o__;f__;g__;s__).
    range: string
    required: false
  type_of_metabolism:
    description: Type of metabolism.
    range: TypeOfMetabolismEnum
    multivalued: true
    required: false
  end_products:
    description: Metabolic end products; ';'-delimited.
    range: string
    multivalued: true
    required: false
  major_end_products:
    description: Major metabolic end products; ';'-delimited.
    range: string
    multivalued: true
    required: false
  minor_end_products:
    description: Minor metabolic end products; ';'-delimited.
    range: string
    multivalued: true
    required: false
  substrates_for_end_products:
    description: Substrates yielding the end products; ';'-delimited.
    range: string
    multivalued: true
    required: false
  fermentation_substrates:
    description: Substrates fermented; ';'-delimited.
    range: string
    multivalued: true
    required: false
  faprotax_traits:
    description: FAPROTAX functional traits; ';'-delimited.
    range: string
    multivalued: true
    required: false
enums:
  CellShapeEnum:
    description: Cell shapes observed in the database.
    permissible_values:
      coccus-shaped: {}
      crescent-shaped: {}
      curved-shaped: {}
      diplococcus-shaped: {}
      dumbbell-shaped: {}
      ellipsoidal: {}
      filament-shaped: {}
      flask-shaped: {}
      helical-shaped: {}
      other: {}
