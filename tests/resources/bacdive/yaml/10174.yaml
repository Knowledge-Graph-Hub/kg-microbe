Culture and growth conditions:
  culture medium:
  - '@ref': 8076
    composition: 'Name: GYM STREPTOMYCES MEDIUM (DSMZ Medium 65)

      Composition:

      Agar 12.0 g/l

      Malt extract 10.0 g/l

      Yeast extract 4.0 g/l

      Glucose 4.0 g/l

      CaCO3 2.0 g/l

      Distilled water'
    growth: 'yes'
    link: https://bacmedia.dsmz.de/medium/65
    name: GYM STREPTOMYCES MEDIUM (DSMZ Medium 65)
  - '@ref': 18347
    composition: "Name: ISP 2 / Yeast Malt Agar (5265); 5265\r\nComposition \r\nMalt\
      \ extract 10.0 g/l\r\nYeast extract 4.0 g/l\r\nGlucose 4.0 g/l\r\nAgar 15.0\
      \ g/l\r\nPreparation:\r\nSterilisation: 20 minutes at 121\xB0C\r\npH before\
      \ sterilisation: 7.0\r\nUsage: Maintenance and Taxonomy\r\nOrganisms: All Actinomycetes"
    growth: 'yes'
    name: ISP 2
  - '@ref': 18347
    composition: "Name: ISP 3; 5315\r\nComposition \r\nDog oat flakes 20.0 g/l\r\n\
      Trace element solution (5314) 2.5 ml/l \r\nAgar 18.0 g/l\r\nPreparation: Oat\
      \ flakes are cooked for 20 minutes, trace element solution and agar are added\
      \ (in the case of non rolled oat flakes the suspension has to bee filtrated).\r\
      \nSterilisation: 20 minutes at 121\xB0C\r\npH before sterilisation: 7.8\r\n\
      Usage: Maintenance and taxonomy (e.g. SEM As liquid medium for metabolite production)\r\
      \nOrganisms: All Actinomycetes\r\n\r\nTrace element solution 5314\r\n\r\nName:\
      \  Trace element solution 5314; 5314                \r\nComposition\r\nCaCl2\
      \ x H2O    3.0 g/l\r\nFe-III-citrate    1.0 g/l\r\nMnSO4    0.2 g/l\r\nZnCl2\
      \     0.1 g/l\r\nCuSO4 x 5 H2O 0.025 g/l\r\nSodium tetra borate  0.2 g/l\r\n\
      CoCl2 x 6 H2O 0.004 g/l\r\nSodium molybdate   0.01 g/l\r\nPreparation: Use double\
      \ destillated water. \r\nSterilisation: 20 minutes at 121\xB0C \r\npH before\
      \ sterilisation: \r\nUsage: Trace element solution for different media \r\n\
      Organisms:"
    growth: 'yes'
    name: ISP 3
  - '@ref': 18347
    composition: "Name: ISP 4; DSM 547\r\n\r\nSolution I:\r\nDifco soluble starch,\
      \ 10.0 g. \r\nMake a paste of the starch with a small amount of cold distilled\
      \ water and bring to a volume of 500 ml.\r\n\r\nSolution II:\r\nCaCO3\t2.0\t\
      g\r\nK2HPO4 (anhydrous)\t1.0\tg\r\nMgSO4 x 7 H2O\t1.0\tg\r\nNaCl\t1.0\tg\r\n\
      (NH4)2SO4\t2.0\tg\r\nDistilled water\t500.0 ml\r\nTrace salt solution (see below)\t\
      1.0\tml\r\n\r\nThe pH should be between 7.0 and 7.4. Do not adjust if it is\
      \ within this range. Mix solutions I and II together. Add 20.0 g agar. Liquify\
      \ agar by steaming at 100\xB0C for 10 to 20 min.\r\n\r\nTrace element solution:\r\
      \nFeSO4 x 7 H2O\t0.1\tg\r\nMnCl2 x 4 H2O\t0.1\tg\r\nZnSO4 x 7 H2O\t0.1\tg\r\n\
      Distilled water\t100.0 ml"
    growth: 'yes'
    name: ISP 4
  - '@ref': 18347
    composition: "Name: ISP 5 (5323)\r\nComposition \r\nL-Asparagine 1.0 g/l\r\nGlycerol\
      \ 10.0 g/l\r\nK2HPO4 1.0 g/l\r\nSalt solution (see preparation) 1.0 ml/l\r\n\
      Agar 20.0 g/l\r\nPreparation:\r\nSalt solution\r\n1.0 g FeSO4 x 7 H2O \r\n1.0\
      \ g MnCl2 x 4 H2O\r\n1.0 g ZNSO4 x 7 H2O \r\nin 100 ml water\r\nSterilisation:\r\
      \n20 minutes at 121\xB0C\r\npH before sterilisation:\r\n7.2\r\nUsage:\r\nMaintenance\
      \ and taxonomy\r\nOrganisms:\r\nAll Actinomycetes"
    growth: 'yes'
    name: ISP 5
  - '@ref': 18347
    composition: "Name: ISP 6 (5318)\r\nComposition\r\nPeptone 15.0 g/l\r\nProteose\
      \ peptose 5.0 g/l\r\nFerric ammonium citrate 0.5 g/l\r\nSodium glycerophosphate\
      \ 1.0 g/l\r\nSodium thiosulfate 0.08 g/l\r\nYeast extract 1.0 g/l\r\nAgar 15.0\
      \ g/l\r\nSterilisation:\r\n20 minutes at 121\xB0C\r\npH before sterilisation:\r\
      \nUsage: Production of melanoid pigments\r\nOrganisms:\r\nAll Actinomycetes"
    growth: 'yes'
    name: ISP 6
  - '@ref': 18347
    composition: "Name: ISP 7 (5322)\r\nComposition \r\nGlycerol 15.0 g/l\r\nL-Tyrosine\
      \ 0.5 g/l\r\nL-Asparagine 1.0 g/l\r\nK2HPO4 0.5 g/l\r\nNaCl 0.5 g/l\r\nFeSO4\
      \ x 7 H2O 0.01 g/l\r\nTrace element solution 5343 1.0 ml/l\r\nAgar 20.0\r\n\
      Sterilisation:\r\n20 minutes at 121\xB0C\r\npH before sterilisation:\r\n7.3\r\
      \nUsage:\r\nProduction of melanoid pigments\r\nOrganisms:\r\nAll Actinomycetes"
    growth: 'yes'
